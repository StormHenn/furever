<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Furever">
  <!--
    Furever app mark. A paw whose pad is a heart, printed as two plates that
    sit slightly out of register — the app's `--shadow-paper` (3px 4px 0, hard,
    no blur) scaled up until the misprint becomes the logo.
    Palette is straight from src/index.css; no colours live only here.
  -->
  <defs>
    <pattern id="tooth" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.4" fill="#2a2118" opacity=".07"/>
    </pattern>
    <g id="paw">
      <path d="M256 388c0 0-104-70-104-140 0-42 34-66 66-54 19 7 32 25 38 39 6-14 19-32 38-39 32-12 66 12 66 54 0 70-104 140-104 140z"/>
      <ellipse cx="130" cy="168" rx="32" ry="40" transform="rotate(-24 130 168)"/>
      <ellipse cx="204" cy="130" rx="33" ry="42" transform="rotate(-9 204 130)"/>
      <ellipse cx="308" cy="130" rx="33" ry="42" transform="rotate(9 308 130)"/>
      <ellipse cx="382" cy="168" rx="32" ry="40" transform="rotate(24 382 168)"/>
    </g>
  </defs>

  <rect width="512" height="512" fill="#f6f0e3"/>
  <rect width="512" height="512" fill="url(#tooth)"/>

  <g transform="rotate(-4 256 256) translate(0 12)">
    <use href="#paw" x="12" y="15" fill="#2a2118"/>
    <use href="#paw" fill="#c2593c"/>
  </g>
</svg>
